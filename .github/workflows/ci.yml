name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile
        run: python -m py_compile dah_api.py auth_session.py debtor_notifications.py main.py

      - name: Test
        run: python -m pytest

      - name: Lint
        run: |
          python -m ruff check .
          python -m flake8
          python -m isort --check-only .
          python -m pylint dah_api.py auth_session.py debtor_notifications.py main.py tests
          python -m pyright
          python -m vulture dah_api.py auth_session.py debtor_notifications.py main.py tests --min-confidence 100 --ignore-names cli_env

      - name: Security scan
        run: python -m bandit -q -r .

      - name: Complexity
        run: |
          python -m radon cc -s -a dah_api.py auth_session.py debtor_notifications.py main.py tests
          bad_complexity="$(python -m radon cc -s -n B dah_api.py auth_session.py debtor_notifications.py main.py tests)"
          if [ -n "$bad_complexity" ]; then
            echo "$bad_complexity"
            exit 1
          fi
